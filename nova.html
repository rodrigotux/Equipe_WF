<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Equipe WF - Checklist</title>

<style>
*{box-sizing:border-box;}

body{
    font-family:Arial,sans-serif;
    margin:0;
    padding:0;
    background:#000;
    color:#fff;
}

.container{
    max-width:700px;
    margin:20px auto;
    background:#1e1e2f;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.8);
}

h1{
    text-align:center;
    color:#4cafef;
    margin-bottom:20px;
}

.section{
    margin-bottom:18px;
}

.section label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
    color:#4cafef;
}

input, textarea, select{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border:1px solid #4cafef;
    border-radius:6px;
    background:#2a2a3d;
    color:#fff;
}

.checkbox-group{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:6px;
}

.checkbox-group label{
    color:#fff;
    font-weight:normal;
}

.btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
    margin-top:8px;
    background:#4cafef;
    color:#fff;
}

.btn:hover{
    background:#357ab8;
}

.btn:disabled{
    opacity:.6;
    cursor:not-allowed;
}

#previewFotos{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(90px,1fr));
    gap:8px;
    margin-top:10px;
}

.foto-item{
    position:relative;
}

.foto-item img{
    width:100%;
    height:90px;
    object-fit:cover;
    border-radius:6px;
}

.remover{
    position:absolute;
    top:2px;
    right:2px;
    background:red;
    color:#fff;
    border:none;
    border-radius:50%;
    width:22px;
    height:22px;
    cursor:pointer;
    font-size:12px;
}

#statusEnvio{
    text-align:center;
    margin-top:10px;
    color:#4cafef;
    font-weight:bold;
}
</style>
</head>

<body>
<div class="container">
<h1>Checklist Equipe WF</h1>

<div class="section">
<label>Início do Expediente</label>
<input type="datetime-local" id="inicio">

<label>Término do Expediente</label>
<input type="datetime-local" id="termino">

<label>Placa do Caminhão</label>
<select id="placa">
<option value="">Escolha</option>
<option>LQA6E03</option>
<option>GRR8I78</option>
</select>

<label>Tipo de Carga</label>
<select id="carga">
<option value="">Escolha</option>
<option>VUC</option>
<option>LB</option>
</select>
</div>

<div class="section">
<label>ID da Rota</label>
<input type="number" id="idRota">

<label>Combustível (R$)</label>
<input type="text" id="combustivel" placeholder="100,00">

<label>Preço Combustível</label>
<input type="number" step="0.01" id="preco_combustivel">

<label>Entregas Mal-Sucedidas</label>
<input type="number" id="insucessas">

<label>Entregas Recusadas</label>
<input type="number" id="recusadas">

<label>Km Inicial</label>
<input type="number" id="kmInicial">

<label>Km Final</label>
<input type="number" id="kmFinal">

<label>Km Rodado</label>
<input type="text" id="kmRodado" readonly>
</div>

<div class="section">
<label>Quantidade de Geladeiras</label>
<input type="number" id="geladeiras">

<label>Quantidade de Volumosos</label>
<input type="number" id="volumosos">
</div>

<div class="section">
<label>Status do Veículo</label>
<div class="checkbox-group">
<label><input type="checkbox" value="Água"> Água</label>
<label><input type="checkbox" value="Óleo"> Óleo</label>
<label><input type="checkbox" value="Farol Alto"> Farol Alto</label>
<label><input type="checkbox" value="Farol Baixo"> Farol Baixo</label>
<label><input type="checkbox" value="Seta Direita"> Seta Direita</label>
<label><input type="checkbox" value="Seta Esquerda"> Seta Esquerda</label>
<label><input type="checkbox" value="Luz Freio"> Luz Freio</label>
<label><input type="checkbox" value="Retrovisor Direito"> Retrovisor Direito</label>
<label><input type="checkbox" value="Retrovisor Esquerdo"> Retrovisor Esquerdo</label>
<label><input type="checkbox" value="Baú Limpo"> Baú Limpo</label>
<label><input type="checkbox" value="Cabine Limpa"> Cabine Limpa</label>
</div>
</div>

<div class="section">
<label>Motorista</label>
<select id="motorista">
<option value="">Escolha</option>
<option>João</option>
</select>

<label>Ajudante</label>
<select id="ajudante">
<option value="">Escolha</option>
<option>Gabriel</option>
</select>

<label>Observações</label>
<textarea id="observacoes" rows="4"></textarea>
</div>

<div class="section">
<label>Fotos de Alterações</label>

<input
type="file"
id="foto"
accept="image/*"
capture="environment"
multiple
style="display:none;"
>

<button type="button" class="btn" id="btnCamera">
📷 Tirar Fotos
</button>

<div id="previewFotos"></div>
</div>

<button type="button" class="btn" id="btnEnviar">
Enviar Checklist
</button>

<div id="statusEnvio"></div>

</div>

<script>
const fotoInput = document.getElementById('foto');
const preview = document.getElementById('previewFotos');
const btnCamera = document.getElementById('btnCamera');
const btnEnviar = document.getElementById('btnEnviar');
const statusEnvio = document.getElementById('statusEnvio');

let arquivosSelecionados = [];

btnCamera.addEventListener('click', ()=> fotoInput.click());

fotoInput.addEventListener('change', (e)=>{
    arquivosSelecionados = [...arquivosSelecionados, ...Array.from(e.target.files)];
    renderFotos();
});

function renderFotos(){
    preview.innerHTML = '';

    arquivosSelecionados.forEach((file,index)=>{
        const div = document.createElement('div');
        div.className = 'foto-item';

        const img = document.createElement('img');
        img.src = URL.createObjectURL(file);

        const btn = document.createElement('button');
        btn.className = 'remover';
        btn.innerText = 'X';
        btn.onclick = ()=>{
            arquivosSelecionados.splice(index,1);
            renderFotos();
        };

        div.appendChild(img);
        div.appendChild(btn);
        preview.appendChild(div);
    });
}

function calcularKm(){
    const ini = Number(document.getElementById('kmInicial').value || 0);
    const fim = Number(document.getElementById('kmFinal').value || 0);
    document.getElementById('kmRodado').value =
        fim > ini ? (fim - ini) : '';
}

document.getElementById('kmInicial').addEventListener('input', calcularKm);
document.getElementById('kmFinal').addEventListener('input', calcularKm);

async function uploadFoto(file){
    const formData = new FormData();
    formData.append("image", file);

    const response = await fetch(
        "https://api.imgbb.com/1/upload?expiration=600&key=fc70138065bf5ce76b2fe31592d342c3",
        { method:"POST", body:formData }
    );

    const result = await response.json();
    return result?.data?.url || '';
}

function validar(){
    if(!document.getElementById('inicio').value) return "Preencha início.";
    if(!document.getElementById('placa').value) return "Selecione placa.";
    if(!document.getElementById('motorista').value) return "Selecione motorista.";
    return "";
}

btnEnviar.addEventListener('click', async ()=>{

    const erro = validar();
    if(erro){
        alert(erro);
        return;
    }

    btnEnviar.disabled = true;
    btnEnviar.innerText = "Enviando...";
    statusEnvio.innerText = "Processando...";

    try{

        const statusVeiculo = Array.from(
            document.querySelectorAll('.checkbox-group input:checked')
        ).map(x=>x.value).join(', ');

        const obsOriginal = document.getElementById('observacoes').value;

        const observacoes = obsOriginal +
        "\nStatus Veículo: " + statusVeiculo;

        const combustivelValor = parseFloat(
            document.getElementById('combustivel').value.replace(',','.')
        ) || 0;

        const preco = parseFloat(
            document.getElementById('preco_combustivel').value
        ) || 1;

        const litros = (combustivelValor/preco).toFixed(2);

        let fotosUrls = [];

        if(arquivosSelecionados.length){
            fotosUrls = await Promise.all(
                arquivosSelecionados.map(file=>uploadFoto(file))
            );
        }

        let latitude = "";
        let longitude = "";

        if(navigator.geolocation){
            await new Promise(resolve=>{
                navigator.geolocation.getCurrentPosition(pos=>{
                    latitude = pos.coords.latitude;
                    longitude = pos.coords.longitude;
                    resolve();
                }, ()=>resolve());
            });
        }

        const data = {
            inicio: inicio.value,
            termino: termino.value,
            placa: placa.value,
            carga: carga.value,
            idRota: idRota.value,
            geladeiras: geladeiras.value,
            volumosos: volumosos.value,
            insucessas: insucessas.value,
            recusadas: recusadas.value,
            combustivel: combustivel.value,
            preco_combustivel: preco_combustivel.value,
            litros_abastecidos: litros,
            kmInicial: kmInicial.value,
            kmFinal: kmFinal.value,
            kmRodado: kmRodado.value,
            motorista: motorista.value,
            ajudante: ajudante.value,
            observacoes: observacoes,
            fotos: fotosUrls.join(' | '),
            latitude: latitude,
            longitude: longitude
        };

        await fetch(
        "https://script.google.com/macros/s/AKfycbxTEymdWY1CUZTk_8b9RWCJG__zUTQaMiNmbT7CrK1BhgDYOp7ELiyq-b53EBK08BHDsQ/exec",
        {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            mode:"no-cors",
            body:JSON.stringify(data)
        });

        alert("Checklist enviado com sucesso!");

        document.querySelectorAll('input').forEach(x=>{
            if(x.type !== 'file') x.value='';
        });

        document.querySelectorAll('textarea').forEach(x=>x.value='');
        document.querySelectorAll('select').forEach(x=>x.selectedIndex=0);
        document.querySelectorAll('.checkbox-group input')
            .forEach(x=>x.checked=false);

        arquivosSelecionados = [];
        renderFotos();
        statusEnvio.innerText = "Enviado com sucesso!";

    }catch(e){
        console.error(e);
        alert("Erro ao enviar.");
        statusEnvio.innerText = "Erro no envio.";
    }

    btnEnviar.disabled = false;
    btnEnviar.innerText = "Enviar Checklist";
});
</script>
</body>
</html>
